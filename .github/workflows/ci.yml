name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: Format, lint, types, unit tests and build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Build static site
        run: npm run build:site

      - name: Publish verified site artifact
        uses: actions/upload-artifact@v7
        with:
          name: verified-site
          path: dist/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 3
          overwrite: true

  browser-tests:
    name: Playwright (${{ matrix.browser }})
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    needs: fast-gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Download verified site artifact
        uses: actions/download-artifact@v8
        with:
          name: verified-site
          path: dist

      - name: Run browser tests
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          PRIVACY_CANARY_ROUTES: tools/json-formatter,tools/base64-codec,tools/url-codec,tools/unix-timestamp,tools/text-diff,tools/regex-tester,tools/hash-generator,tools/yaml-json-converter,tools/jwt-decoder,tools/csv-json-converter,tools/query-params

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.browser }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  lighthouse:
    name: Lighthouse mobile quality gate
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    needs: fast-gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download verified site artifact
        uses: actions/download-artifact@v8
        with:
          name: verified-site
          path: dist

      - name: Run Lighthouse assertions
        run: npm run test:lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports-${{ github.run_attempt }}
          path: lighthouse-reports/
          if-no-files-found: ignore
          retention-days: 14
