name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  package:
    name: Package verified Pages artifact
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      pages_artifact_name: ${{ steps.artifact_name.outputs.name }}
    steps:
      - name: Download site artifact from successful CI run
        uses: actions/download-artifact@v8
        with:
          name: verified-site
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Select rerun-safe Pages artifact name
        id: artifact_name
        shell: bash
        run: echo "name=github-pages-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: dist

  deploy:
    name: Deploy verified revision
    needs: package
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ needs.package.outputs.pages_artifact_name }}
