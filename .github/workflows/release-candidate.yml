name: Real Browser Release Candidate

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: release-candidate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release candidate once
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Publish release candidate artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-site
          path: dist/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 3
          overwrite: true

  edge-windows:
    name: Microsoft Edge on Windows 2025
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    needs: build
    runs-on: windows-2025
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release candidate artifact
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-site
          path: dist

      - name: Smoke test real Microsoft Edge
        run: node scripts/real-browser-smoke.mjs edge

      - name: Upload Edge acceptance record
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-edge-windows-${{ github.run_attempt }}
          path: release-evidence/
          if-no-files-found: ignore
          retention-days: 30

  safari-macos:
    name: Safari on macOS 15
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    needs: build
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release candidate artifact
        uses: actions/download-artifact@v8
        with:
          name: release-candidate-site
          path: dist

      - name: Enable Safari WebDriver
        run: sudo safaridriver --enable

      - name: Smoke test real Safari
        run: node scripts/real-browser-smoke.mjs safari

      - name: Upload Safari acceptance record
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-safari-macos-${{ github.run_attempt }}
          path: release-evidence/
          if-no-files-found: ignore
          retention-days: 30

  release-evidence:
    name: Aggregate and verify v1.0 release evidence
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    needs: [edge-windows, safari-macos]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.3

      - name: Download Edge and Safari records
        uses: actions/download-artifact@v8
        with:
          pattern: release-evidence-*-*-${{ github.run_attempt }}
          path: release-evidence
          merge-multiple: true

      - name: Verify candidate evidence
        run: node scripts/verify-release-evidence.mjs

      - name: Upload verified v1.0 evidence bundle
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-v1-${{ github.run_attempt }}
          path: release-evidence/
          if-no-files-found: error
          retention-days: 30
          overwrite: true
