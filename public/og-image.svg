<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Online Tools Hub</title>
  <desc id="desc">Local, fast and private browser tools for image compression, JSON, Base64, URL, time and UUID.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fc" />
      <stop offset="1" stop-color="#ebe9ff" />
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6557db" />
      <stop offset="1" stop-color="#087c70" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#2b2478" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#background)" />
  <circle cx="82" cy="40" r="240" fill="#6557db" opacity="0.08" />
  <circle cx="1120" cy="588" r="280" fill="#087c70" opacity="0.08" />
  <g transform="translate(84 82)">
    <rect width="1032" height="466" rx="42" fill="#ffffff" stroke="#dde2ed" filter="url(#shadow)" />
    <g transform="translate(64 58)">
      <rect width="86" height="86" rx="25" fill="url(#mark)" />
      <text x="43" y="57" text-anchor="middle" fill="#ffffff" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="700">{ }</text>
      <text x="116" y="37" fill="#17213b" font-family="DejaVu Sans, sans-serif" font-size="34" font-weight="700" letter-spacing="1">ONLINE TOOLS HUB</text>
      <text x="116" y="71" fill="#68728a" font-family="DejaVu Sans, sans-serif" font-size="18" font-weight="500" letter-spacing="4">LOCAL · FAST · PRIVATE</text>
    </g>
    <text x="64" y="236" fill="#17213b" font-family="DejaVu Sans, sans-serif" font-size="56" font-weight="700">Useful tools.</text>
    <text x="64" y="302" fill="#6557db" font-family="DejaVu Sans, sans-serif" font-size="56" font-weight="700">Your data stays yours.</text>
    <g transform="translate(64 352)" font-family="DejaVu Sans, sans-serif" font-size="18" font-weight="700">
      <g><rect width="130" height="52" rx="16" fill="#eeecff" /><text x="65" y="33" text-anchor="middle" fill="#3e32a5">JSON</text></g>
      <g transform="translate(144)"><rect width="130" height="52" rx="16" fill="#e6f7f3" /><text x="65" y="33" text-anchor="middle" fill="#087c70">BASE64</text></g>
      <g transform="translate(288)"><rect width="130" height="52" rx="16" fill="#eeecff" /><text x="65" y="33" text-anchor="middle" fill="#3e32a5">URL</text></g>
      <g transform="translate(432)"><rect width="130" height="52" rx="16" fill="#e6f7f3" /><text x="65" y="33" text-anchor="middle" fill="#087c70">IMAGE</text></g>
      <g transform="translate(576)"><rect width="130" height="52" rx="16" fill="#eeecff" /><text x="65" y="33" text-anchor="middle" fill="#3e32a5">TIME</text></g>
      <g transform="translate(720)"><rect width="130" height="52" rx="16" fill="#e6f7f3" /><text x="65" y="33" text-anchor="middle" fill="#087c70">UUID</text></g>
    </g>
  </g>
</svg>
